<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="b">
      <circle cx="16" cy="21" r="10"/>
    </clipPath>
  </defs>

  <!-- Mast -->
  <rect x="15" y="5" width="2" height="7" fill="#161e2e" rx="0.5"/>

  <!-- Body drop-shadow -->
  <circle cx="16.5" cy="22" r="10" fill="#0f172a" opacity="0.25"/>

  <!-- Body fill clipped to circle -->
  <g clip-path="url(#b)">
    <rect x="0" y="0" width="32" height="32" fill="#dc2626"/>
    <rect x="0" y="18" width="32" height="6" fill="#f0f0f0"/>
  </g>

  <!-- Body outline -->
  <circle cx="16" cy="21" r="10" fill="none" stroke="#161e2e" stroke-width="1.4"/>

  <!-- Navigation light glow -->
  <circle cx="16" cy="4" r="4.5" fill="#0e7490" opacity="0.35"/>

  <!-- Navigation light -->
  <circle cx="16" cy="4" r="3.5" fill="#0891b2"/>
  <circle cx="16" cy="4" r="2.8" fill="#22d3ee"/>
  <circle cx="15.4" cy="3.2" r="1.1" fill="#cffafe" opacity="0.85"/>

  <!-- Light outline -->
  <circle cx="16" cy="4" r="3.5" fill="none" stroke="#161e2e" stroke-width="0.9"/>
</svg>
